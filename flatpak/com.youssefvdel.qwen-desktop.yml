id: com.youssefvdel.qwen-desktop
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node18
command: run.sh
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --allow=devel
  - --filesystem=home
  - --filesystem=/tmp
  - --env=NODE_ENV=production
  - --env=XDG_CONFIG_HOME=/var/config

modules:
  - name: node
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/node18/install.sh
    post-install:
      - |
        cd /app
        echo '#!/bin/sh' > run.sh
        echo 'export XDG_CONFIG_HOME=/var/config' >> run.sh
        echo 'zypak-wrapper.sh /app/qwen-desktop-linux/qwen-desktop-linux "$@"' >> run.sh
        chmod +x run.sh

  - name: qwen-desktop-linux
    buildsystem: simple
    build-commands:
      - mkdir -p /app/qwen-desktop-linux
      - cp -r . /app/qwen-desktop-linux
      - cd /app/qwen-desktop-linux
      - npm ci --production=false
      - npx tsc
      - npx electron-builder --linux flatpak --dir --config.extraMetadata.main=out/main/index.js
      - cp -r dist/linux-unpacked/* /app/qwen-desktop-linux/
    sources:
      - type: git
        url: https://github.com/youssefvdel/qwen-desktop-linux.git
        tag: v1.0.0
        commit: fd430c8

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - "*.a"
  - "*.la"
